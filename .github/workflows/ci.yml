name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run E2E
        run: npm run test:e2e

      - name: Run MCP smoke test
        run: npm run test:mcp

      - name: Run demo
        run: npm run demo

      - name: Build website
        run: npm run website:build

      - name: Verify package
        run: npm run verify:pack
